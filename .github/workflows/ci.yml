name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Chicken.xcodeproj -scheme Chicken

      - name: Build for macOS
        run: |
          set -euo pipefail
          xcodebuild build \
            -project Chicken.xcodeproj \
            -scheme Chicken \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Chicken.xcodeproj \
            -scheme Chicken \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
